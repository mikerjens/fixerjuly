<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGTN26 — Faroe Islands Production Portal</title>
<style>
  :root{
    --bg: #0b0e13;
    --panel: #12161d;
    --panel-2: #171c25;
    --border: #232a35;
    --text: #e9edf3;
    --text-dim: #8b95a5;
    --accent: #3fd1c4;
    --accent-dim: #1c4f4a;
    --red: #e8544a;
    --red-dim: #3a1f1d;
    --amber: #e0a944;
    --radius: 12px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--accent);}

  header.top{
    background:linear-gradient(180deg, #12161d 0%, #0b0e13 100%);
    border-bottom:1px solid var(--border);
    padding:28px 24px 0 24px;
    position:sticky; top:0; z-index:50;
  }
  .top-inner{max-width:1100px;margin:0 auto;}
  .eyebrow{
    text-transform:uppercase; letter-spacing:.14em; font-size:11px;
    color:var(--accent); font-weight:600; margin-bottom:6px;
  }
  h1{margin:0 0 4px 0; font-size:26px; font-weight:700; letter-spacing:-0.01em;}
  .subtitle{color:var(--text-dim); font-size:14px; margin-bottom:20px;}

  nav.tabs{
    display:flex; gap:4px; max-width:1100px; margin:0 auto;
  }
  nav.tabs button{
    background:none; border:none; color:var(--text-dim);
    font-size:14px; font-weight:600; padding:12px 18px;
    cursor:pointer; border-bottom:2px solid transparent;
    transition:.15s;
  }
  nav.tabs button:hover{color:var(--text);}
  nav.tabs button.active{color:var(--accent); border-bottom-color:var(--accent);}

  main{max-width:1100px; margin:0 auto; padding:28px 24px 80px 24px;}
  .view{display:none;}
  .view.active{display:block;}

  .toolbar{display:flex; gap:12px; align-items:center; margin-bottom:24px; flex-wrap:wrap;}
  select{
    background:var(--panel); color:var(--text); border:1px solid var(--border);
    border-radius:8px; padding:10px 14px; font-size:14px; font-weight:600;
    min-width:220px; cursor:pointer;
  }
  .hint{color:var(--text-dim); font-size:13px;}

  .day{
    margin-bottom:28px; border:1px solid var(--border); border-radius:var(--radius);
    overflow:hidden; background:var(--panel);
  }
  .day-head{
    padding:14px 18px; background:var(--panel-2); border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; gap:6px;
  }
  .day-head .dname{font-size:15px; font-weight:700;}
  .day-head .ddate{color:var(--accent); font-size:13px; font-weight:600;}
  .day-focus{padding:10px 18px; color:var(--text-dim); font-size:13px; border-bottom:1px solid var(--border); font-style:italic;}

  .event{
    padding:16px 18px; border-bottom:1px solid var(--border); position:relative;
  }
  .event:last-child{border-bottom:none;}
  .event.not-filmed{border-left:3px solid var(--red); background:rgba(232,84,74,0.04);}
  .event.filmed{border-left:3px solid transparent;}

  .event-top{display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:flex-start;}
  .event-title{font-size:15px; font-weight:700; display:flex; align-items:center; gap:8px;}
  .event-time{color:var(--accent); font-weight:700; font-size:13px; white-space:nowrap;}

  .badge{
    display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700;
    padding:3px 8px; border-radius:20px; text-transform:uppercase; letter-spacing:.03em;
  }
  .badge.no{background:var(--red-dim); color:#ff9f97;}
  .badge.yes{background:var(--accent-dim); color:var(--accent);}

  .event-meta{margin-top:8px; color:var(--text-dim); font-size:13px;}
  .event-meta strong{color:var(--text);}
  .event-desc{margin-top:8px; font-size:13.5px; color:#c7cedb;}
  .event-note{
    margin-top:10px; padding:8px 12px; background:rgba(224,169,68,.08);
    border-left:2px solid var(--amber); border-radius:4px; font-size:12.5px; color:#f0cf8f;
  }

  .chips{display:flex; flex-wrap:wrap; gap:6px; margin-top:10px;}
  .chip{
    background:var(--panel-2); border:1px solid var(--border); color:var(--text);
    font-size:12px; padding:4px 10px; border-radius:20px;
  }

  .qbtn{
    margin-top:12px; display:inline-flex; align-items:center; gap:6px;
    background:var(--accent-dim); color:var(--accent); border:1px solid var(--accent);
    padding:7px 14px; border-radius:8px; font-size:12.5px; font-weight:700;
    cursor:pointer; transition:.15s;
  }
  .qbtn:hover{background:var(--accent); color:#06211f;}
  .qbtn .chev{transition:transform .2s;}
  .qbtn.open .chev{transform:rotate(180deg);}

  .qpanel{
    display:none; margin-top:12px; padding:14px 16px; background:var(--panel-2);
    border:1px solid var(--border); border-radius:8px;
  }
  .qpanel.open{display:block;}
  .qpanel h4{margin:0 0 8px 0; font-size:12.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-dim);}
  .qpanel ul{margin:0; padding-left:18px;}
  .qpanel li{margin-bottom:7px; font-size:13.5px; color:#dbe1ea;}
  .qpanel .qnote{margin-top:10px; font-size:12px; color:var(--text-dim); font-style:italic;}
  .qpanel li .fo{margin-top:3px; font-size:12.5px; color:var(--accent); font-style:italic;}

  .contacts-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(230px,1fr)); gap:14px;
  }
  .card{
    background:var(--panel); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px; display:flex; gap:12px; align-items:flex-start;
  }
  .avatar{
    width:42px; height:42px; border-radius:50%; background:var(--accent-dim);
    color:var(--accent); display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:14px; flex-shrink:0;
  }
  .card .name{font-weight:700; font-size:14.5px;}
  .card .role{color:var(--text-dim); font-size:12.5px; margin-top:1px;}
  .card .info{margin-top:8px; font-size:12.5px; color:#c7cedb; display:flex; flex-direction:column; gap:2px;}
  .group-title{
    font-size:12px; text-transform:uppercase; letter-spacing:.1em; color:var(--text-dim);
    margin:26px 0 12px 0; font-weight:700;
  }
  .group-title:first-child{margin-top:0;}

  footer{max-width:1100px; margin:0 auto; padding:0 24px 40px; color:var(--text-dim); font-size:12px;}

  @media(max-width:600px){
    h1{font-size:21px;}
    nav.tabs{overflow-x:auto;}
    nav.tabs button{padding:10px 12px; font-size:13px; white-space:nowrap;}
  }
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <div class="eyebrow">FIXER.FO · CGTN26</div>
    <h1>CGTN Faroe Islands — Production Portal</h1>
    <div class="subtitle">25–31 July 2026 · Local producer: Michael Koba, FIXER sp/f</div>
    <nav class="tabs">
      <button data-view="schedule" class="active">Full Schedule</button>
      <button data-view="myschedule">My Schedule</button>
      <button data-view="contacts">Contacts</button>
    </nav>
  </div>
</header>

<main>

  <!-- FULL SCHEDULE -->
  <div id="schedule" class="view active"></div>

  <!-- MY SCHEDULE -->
  <div id="myschedule" class="view">
    <div class="toolbar">
      <select id="nameSelect"></select>
      <span class="hint">Select your name to see only your own events</span>
    </div>
    <div id="myscheduleResults"></div>
  </div>

  <!-- CONTACTS -->
  <div id="contacts" class="view"></div>

</main>

<footer>CGTN Faroe Islands Shoot · Produced by FIXER sp/f · Last updated 21 July 2026</footer>

<script>
const PEOPLE = {

  johnb:    {name:"John B", role:"Camera operator / Photographer (CGTN)", phone:"+44 7812 378957"},
  bjarni:   {name:"Bjarni Arge", role:"Press contact, Prime Minister's Office", phone:"+298 262109", email:"bjarnia@tinganes.fo"},
  pal:      {name:"Professor Pál Weihe", role:"Contributor — Health / research", phone:"+298 216696", email:"palweihe@gmail.com"},
  annika:   {name:"Annika Arnsteinsdóttir", role:"Contributor — Rudda Føroyar", phone:"+298 580630", email:"annika.a.nielsen@gmail.com"},
  jenny:    {name:"Jenny Kallsoy", role:"Contributor — Fishing couple", phone:"+298 213434"},
  sonni:    {name:"Sonni Kallsoy", role:"Contributor — Fishing couple", phone:"—"},
  susanna:  {name:"Súsanna Sørensen", role:"Contributor — Visit Faroe Islands", phone:"+298 556138", email:"susanna@visitfaroeislands.com"},
  beinir:   {name:"Beinir Johannesen", role:"Contributor — Prime Minister of the Faroe Islands", phone:"via Bjarni Arge"},
  joannes:  {name:"Jóannes Eidesgaard", role:"Contributor — Former Prime Minister", phone:"+298 599800", email:"joanneseidesgaard@gmail.com"},
  uni:      {name:"Uni Danielsen", role:"Contributor — CEO, TUNNIL.FO (undersea tunnels)", phone:"+298 285700", email:"ud@tunnil.fo"},
};

const CORE_CREW = ["michael","rhys","jeff","stevea","johnb"];

// Question sets pulled from the CGTN brief. Power the expandable "Questions" panels.
const QUESTIONS = {
  pal: {
    intro: "Questions prepared for Pál Weihe (14). Shown in English and Faroese. Pál would like the questions sent in advance.",
    items: [
      {en:"When did you first realize there might be a problem with eating pilot whale meat?",
       fo:"Nær var tað fyrstu ferð, tú gjørdist varugur við, at tað kundi vera ein trupulleiki at eta grindahvalakjøt?"},
      {en:"How did you then get funding for your research?",
       fo:"Hvussu eydnaðist tær síðani at fáa fígging til granskingina?"},
      {en:"You released a report in 2008. What were your findings?",
       fo:"Í 2008 almannakunngjørdi tú eina frágreiðing. Hvat vóru týdningarmestu úrslitini?"},
      {en:"You had to go out and tell Faroese people they should no longer eat their traditional food, the food that has sustained life on these islands for centuries. How did you prepare that message? And how was it initially received?",
       fo:"Tú mátti siga við føroyingar, at teir ikki longur áttu at eta ein mat, sum hevur verið partur av føroysku matmentanini í øldir. Hvussu fyrireikaði tú hendan boðskapin, og hvussu varð hann móttikin fyrstu ferð?"},
      {en:"You were seen by some as being unpatriotic. How hard was that for you?",
       fo:"Summi hildu, at tú vart óføðurlandskendur. Hvussu tungt var tað hjá tær persónliga?"},
      {en:"Women have taken your message to heart, especially women who intend to get pregnant. But most men still say: \"We've been eating this for centuries and we're not stopping now.\" How difficult has it been to get the message across to men?",
       fo:"Nógvar kvinnur, serliga tær sum ætla sær at gerast við barn, hava tikið boðskapin til sín. Men nógv menn siga framvegis: \"Vit hava etið hetta í øldir, og tað fara vit at halda fram við.\" Hvussu trupult hevur tað verið at røkka hesum boðskapinum til menn?"},
      {en:"How successful do you feel your campaign has been?",
       fo:"Hvussu væl heldur tú, at arbeiðið við at upplýsa um heilsuvandan hevur eydnast?"},
      {en:"Explain the term \"Arctic dilemma.\"",
       fo:"Kanst tú greiða frá, hvat hugtakið \"Arctic Dilemma\" merkir?"},
      {en:"The Stockholm Convention on Persistent Organic Pollutants obliges countries to eliminate the use of PCBs by 2025. How successful has this been?",
       fo:"Stockholm-sáttmálin áleggur londum at beina burtur varandi lívrunnum dálkingarevnum, millum annað PCB. Hvussu væl heldur tú, at hetta arbeiðið hevur eydnast?"},
      {en:"Your campaign to stop people eating pilot whale came as the anti-whaling movement was becoming louder and louder. How did this affect your campaign?",
       fo:"Títt arbeiði við at ávara ímóti at eta grindahval kom samstundis, sum altjóða mótstøðan móti grindadrápi vaks. Hvussu ávirkaði tað títt arbeiði?"},
      {en:"What are your thoughts now on the Grind?",
       fo:"Hvussu metir tú um grindadrápið í Føroyum í dag?"},
      {en:"What more would you like other countries to do to prevent more contamination?",
       fo:"Hvat ynskir tú, at onnur lond gera meira av fyri at minka um dálkingina í heiminum?"},
      {en:"How do you see the future of whaling in the Faroes?",
       fo:"Hvussu sært tú framtíðina hjá grindadrápinum í Føroyum?"},
      {en:"Should it be banned?",
       fo:"Heldur tú, at grindadráp eigur at verða bannað?"}
    ]
  },
  annika: {
    intro: "Questions prepared for Annika Arnsteinsdóttir, Rudda Føroyar (12). Shown in English and Faroese. To be sent in advance.",
    items: [
      {en:"Sea temperatures around the Faroes have risen over recent decades. What effect has that had on marine life?",
       fo:"Havhitin kring Føroyar er hækkaður seinastu áratíggjuni. Hvørja ávirkan hevur tað havt á lívið í havinum?"},
      {en:"It's had an effect on birds too. Tell me more about that.",
       fo:"Hetta hevur eisini ávirkað fuglalívið. Kanst tú greiða nærri frá tí?"},
      {en:"How is this impacting Faroese people?",
       fo:"Hvussu ávirkar hetta føroyingar og føroyska samfelagið?"},
      {en:"Salmon farming has been hugely successful in improving the lives of Faroese people, but there are dangers too. Talk us through some of the main issues, such as sea lice and escaped farmed salmon.",
       fo:"Alivinnan hevur havt stóran týdning fyri føroyska samfelagið, men hon hevur eisini við sær avbjóðingar. Kanst tú greiða frá teimum størstu trupulleikunum, eitt nú laksalús og alifiski, sum sleppur út?"},
      {en:"Pollutants are a huge issue now. What are you finding?",
       fo:"Dálking er vorðin ein vaksandi trupulleiki. Hvat síggja tit í tykkara arbeiði?"},
      {en:"The world's litter, waste and pollution is washing up on Faroese shores. How does that make you feel?",
       fo:"Rusk, plast og dálking úr øllum heiminum reka upp á føroysku strendurnar. Hvussu kennist tað at síggja hetta?"},
      {en:"Tell me about Rudda Føroyar. How did it start? What are its goals, aims and values?",
       fo:"Greið frá Rudda Føroyum. Hvussu byrjaði átakið, og hvørji eru endamálini, málini og virðini handan arbeiðið?"},
      {en:"What is the Faroese Government doing to help? What more should they do?",
       fo:"Hvat gera føroysku myndugleikarnir fyri at bøta um støðuna, og hvat kundu teir gjørt betur?"},
      {en:"What would you like to see the world's governments do to help the situation?",
       fo:"Hvat ynskir tú, at stjórnir kring heimin gera fyri at bøta um støðuna?"},
      {en:"What more can Faroese people do?",
       fo:"Hvat kunnu vit føroyingar sjálvi gera fyri at gera mun?"},
      {en:"What are your hopes for the future?",
       fo:"Hvat gevur tær vón fyri framtíðina?"},
      {en:"What are your fears for the future, if nothing changes?",
       fo:"Hvat óttast tú mest, um einki broytist?"}
    ]
  },
  kallsoy: {
    intro: "Questions prepared for Jenny & Sonni Kallsoy (10). Shown in English and Faroese — they speak Faroese only, an interpreter/translator is needed.",
    items: [
      {en:"How long have you been fishing these waters and what do you enjoy about it?",
       fo:"Hvussu leingi hava tit fiskað á hesum leiðum, og hvat er tað, tit dáma best við hesum lívinum?"},
      {en:"It must have been a hard way of life. Give me some idea of how bad things can get.",
       fo:"Hetta man hava verið eitt hart lív. Kanst tú greiða frá, hvussu strævið tað kann vera?"},
      {en:"The weather in the Faroes is changing. More frequent, stronger storms. How is this impacting fishermen?",
       fo:"Veðrið í Føroyum tykist broytast, og ódnirnar gerast bæði sterkari og oftari. Hvussu ávirkar tað fiskimenn?"},
      {en:"This way of life has been going on for centuries, but these days it's a struggle to persuade the next generation to carry on. How much of a problem do you think this is? How difficult has it been to persuade your own family to keep fishing?",
       fo:"Hesin lívshátturin hevur verið partur av Føroyum í øldir, men í dag er trupult at fáa næstu ættarliðini at halda fram. Hvussu stóran trupulleika heldur tú, hetta er? Og hvussu hevur tað verið hjá tykkum at eggja tykkara egnu familju at halda fram við fiskiskapinum?"},
      {en:"Many youngsters are turning their back on this way of life, in favour of the bright lights of Tórshavn or Copenhagen. How much of a problem is this?",
       fo:"Nógv ung velja eitt annað lív í Tórshavn, Keypmannahavn ella aðrastaðni. Hvussu stór avbjóðing er hetta fyri smáu bygdirnar og fiskivinnuna?"},
      {en:"If traditional fishing stopped, what would the Faroes lose?",
       fo:"Um tann siðbundni fiskiskapurin hvarv, hvat høvdu Føroyar mist?"},
      {en:"Is the government doing enough to keep people on the islands?",
       fo:"Heldur tú, at myndugleikarnir gera nóg nógv fyri at halda lívi í smáu bygdunum og fáa fólk at búgva har?"},
      {en:"This is a very isolated life. What do you like about it? What are the problems you encounter in living so remotely?",
       fo:"Hetta er eitt lív, har tit búgva rættiliga avbyrgd. Hvat dámar tykkum best við hesum lívinum, og hvørjar avbjóðingar fylgja við?"},
      {en:"How do you think Faroese life will change in the coming years and decades?",
       fo:"Hvussu heldur tú, at lívið í Føroyum fer at broytast komandi árini og áratíggjuni?"},
      {en:"Faroese people have had to adapt to a harsh environment, where there are no trees and many islands are cut off. Why do people stay here? What is it about the Faroese character that keeps them here?",
       fo:"Føroyingar hava altíð lagað seg til eitt hart náttúruumhvørvi, har eingi trø vaksa og nógv oyggjasamfeløg eru avbyrgd. Hví velja fólk framvegis at búgva her? Hvat eyðkennir føroyska sinnið?"}
    ]
  },
  susanna: {
    intro: "Questions prepared for Súsanna Sørensen (6). Shown in English and Faroese.",
    items: [
      {en:"What do you know of the origins of the Faroese language?",
       fo:"Kanst tú greiða frá upprunanum hjá føroyska málinum?"},
      {en:"It was a language that was forbidden by Denmark. How did people keep the language alive?",
       fo:"Føroyskt hevði eina tíð ikki pláss sum almennt mál. Hvussu eydnaðist tað føroyingum at varðveita málið kortini?"},
      {en:"In more recent times, Faroese people have had to invent names for modern things like computers. What names did they choose, and why?",
       fo:"Seinastu áratíggjuni hevur føroyskt fingið nýggj orð fyri nútíðar fyribrigdi, sum til dømis teldur. Hvussu verða slík orð skapt, og hví verða júst hesi orð vald?"},
      {en:"Tell me about the recent efforts to ensure the Faroese language survives into the future, including Google Translate.",
       fo:"Greið frá arbeiðinum at tryggja føroyska málinum eina framtíð, eitt nú arbeiðinum við Google Translate."},
      {en:"What does the Faroese language tell you about the Faroese people? How does the language shape Faroese identity?",
       fo:"Hvat sigur føroyska málið tær um føroyska fólkið? Og hvønn leiklut hevur málið í føroyskari samleika?"},
      {en:"Are there any Faroese words or expressions that are difficult to translate into English? Are there some that are so uniquely Faroese that they cannot truly be translated?",
       fo:"Eru nøkur føroysk orð ella orðatøk, sum eru serliga trupul at umseta til enskt? Eru kanska nøkur, sum bert geva fulla meining á føroyskum?"}
    ],
    note: "Production note: consider whether Jóhan Hendrik Winther Poulsen can be interviewed about creating the first Faroese dictionary."
  },
  beinir: {
    intro: "Draft questions for Beinir Johannesen (6), based on the agreed themes — shown in English and Faroese.",
    items: [
      {en:"The Faroe Islands have a unique relationship with Denmark. How would you describe that relationship today?",
       fo:"Føroyar hava eitt serligt samband við Danmark. Hvussu vildi tú lýst hetta sambandið í dag?"},
      {en:"The Faroe Islands are outside the European Union. What opportunities and challenges does that create?",
       fo:"Føroyar standa uttan fyri Evropeiska Samveldið. Hvørjir fyrimunir og hvørjar avbjóðingar gevur tað Føroyum?"},
      {en:"The North Atlantic has become strategically important again. What role do the Faroe Islands play in today's geopolitical landscape?",
       fo:"Norðuratlantshavið hevur aftur fingið stóran strategiskan týdning. Hvønn leiklut spæla Føroyar í hesum nýggja veruleikanum?"},
      {en:"How important are the Faroese language and culture to the future of the nation?",
       fo:"Hvussu týdningarmikil eru føroyska málið og føroyska mentanin fyri framtíðina hjá Føroyum?"},
      {en:"Many young Faroese study abroad. What is the government doing to encourage them to return home?",
       fo:"Nógv ung fara uttanlands at lesa. Hvat ger landsstýrið fyri at eggja teimum at flyta heim aftur?"},
      {en:"What is your vision for the Faroe Islands over the next twenty to thirty years?",
       fo:"Hvør er tín framtíðarvisjón fyri Føroyar tey komandi tjúgu til tretivu árini?"}
    ],
    note: "IMPORTANT: The climate change question has been removed from this interview — not the right question for this contributor."
  },
  joannes: {
    intro: "Questions prepared for Jóannes Eidesgaard (14). Shown in English and Faroese so the contributor can read them clearly.",
    items: [
      {en:"The Faroe Islands have changed enormously during your lifetime. What do you think has been the biggest transformation?",
       fo:"Føroyar hava broytt seg ómetaliga nógv í tíni lívstíð. Hvat heldur tú hevur verið tann størsta broytingin?"},
      {en:"The ocean has always sustained the Faroes. Is it changing in ways that worry you?",

function initials(name){
  return name.split(" ").map(w=>w[0]).filter(Boolean).slice(0,2).join("").toUpperCase();
}

function eventCard(ev, idx){
  const badge = ev.filmed
    ? `<span class="badge yes">Filming</span>`
    : `<span class="badge no">📷⃠ Not filmed</span>`;
  const noteHtml = ev.note ? `<div class="event-note">${ev.note}</div>` : "";
  let qHtml = "";
  if(ev.qkey && QUESTIONS[ev.qkey]){
    const q = QUESTIONS[ev.qkey];
    const uid = "q-"+idx+"-"+ev.qkey;
    const items = q.items.map(it=>{
      if(typeof it === 'object' && it.fo){
        return `<li>🇬🇧 ${it.en}<div class="fo">🇫🇴 ${it.fo}</div></li>`;
      }
      return `<li>${it}</li>`;
    }).join("");
    const qnote = q.note ? `<div class="qnote">${q.note}</div>` : "";
    qHtml = `
      <button class="qbtn" onclick="toggleQ('${uid}', this)">
        <span class="chev">▾</span> Show questions (${q.items.length})
      </button>
      <div class="qpanel" id="${uid}">
        <h4>${q.intro}</h4>
        <ul>${items}</ul>
        ${qnote}
      </div>`;
  }
  const contact = ev.contact ? `<div class="event-meta">Contact: <strong>${ev.contact}</strong></div>` : "";
  return `
  <div class="event ${ev.filmed?'filmed':'not-filmed'}" data-people='${JSON.stringify(ev.people)}'>
    <div class="event-top">
      <div class="event-title">${ev.title} ${badge}</div>
      <div class="event-time">${ev.time}</div>
    </div>
    <div class="event-meta">📍 <strong>${ev.location}</strong></div>
    <div class="event-desc">${ev.desc}</div>
    ${noteHtml}
    ${contact}
    ${qHtml}
  </div>`;
}

function toggleQ(uid, btn){
  const panel = document.getElementById(uid);
  panel.classList.toggle('open');
  btn.classList.toggle('open');
}

function renderSchedule(){
  const el = document.getElementById('schedule');
  el.innerHTML = EVENTS.map(day => `
    <div class="day">
      <div class="day-head"><span class="dname">${day.day}</span><span class="ddate">${day.date}</span></div>
      <div class="day-focus">${day.focus}</div>
      ${day.items.map((it,i)=>eventCard(it, day.date+"-"+i)).join("")}
    </div>
  `).join("");
}

      ${g.ids.map(id=>{
        const p = PEOPLE[id];

function populateNameSelect(){
  const sel = document.getElementById('nameSelect');
  const ids = Object.keys(PEOPLE);
  sel.innerHTML = `<option value="">— Select your name —</option>` +
    ids.map(id=>`<option value="${id}">${PEOPLE[id].name}</option>`).join("");
  sel.addEventListener('change', renderMySchedule);
}

function renderMySchedule(){
  const id = document.getElementById('nameSelect').value;
  const el = document.getElementById('myscheduleResults');
  if(!id){ el.innerHTML = `<p class="hint">Select your name above to see your events.</p>`; return; }
  const filteredDays = EVENTS.map(day=>{
    const items = day.items.filter(it => it.people.includes(id));
    return {...day, items};
  }).filter(day=>day.items.length>0);

  if(filteredDays.length===0){ el.innerHTML = `<p class="hint">No events found for ${PEOPLE[id].name}.</p>`; return; }

  el.innerHTML = filteredDays.map(day => `
    <div class="day">
      <div class="day-head"><span class="dname">${day.day}</span><span class="ddate">${day.date}</span></div>
      <div class="day-focus">${day.focus}</div>
      ${day.items.map((it,i)=>eventCard(it, day.date+"-my-"+i)).join("")}
    </div>
  `).join("");
}

document.querySelectorAll('nav.tabs button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.view).classList.add('active');
  });
});
