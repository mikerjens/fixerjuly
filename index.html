<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGTN Faroe Islands — Crew Portal</title>
<style>
  :root{
    --bg:#0d0f12;
    --bg-elevated:#15181c;
    --bg-card:#1a1d22;
    --border:#2a2e34;
    --text:#e9eaec;
    --text-dim:#9aa0a8;
    --text-faint:#666c74;
    --red:#e2231a;
    --red-dim:#7a1712;
    --green:#3ba55d;
    --amber:#d9a441;
    --chip-bg:#22262c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}

  header{
    position:sticky;
    top:0;
    z-index:50;
    background:rgba(13,15,18,0.92);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
  }
  .header-inner{
    max-width:960px;
    margin:0 auto;
    padding:14px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-mark{
    font-weight:800;
    font-size:18px;
    letter-spacing:0.5px;
    color:var(--red);
  }
  .brand-sub{
    font-size:11px;
    color:var(--text-faint);
    letter-spacing:1.5px;
    text-transform:uppercase;
  }
  .header-meta{
    text-align:right;
    font-size:12px;
    color:var(--text-dim);
    line-height:1.4;
  }
  .header-meta strong{color:var(--text); font-weight:600;}

  nav.tabs{
    max-width:960px;
    margin:0 auto;
    display:flex;
    gap:4px;
    padding:0 20px;
  }
  .tab-btn{
    background:none;
    border:none;
    color:var(--text-dim);
    font-size:14px;
    font-weight:600;
    padding:12px 16px;
    cursor:pointer;
    border-bottom:2px solid transparent;
    transition:color .15s, border-color .15s;
  }
  .tab-btn:hover{color:var(--text);}
  .tab-btn.active{color:var(--text); border-bottom-color:var(--red);}

  main{max-width:960px; margin:0 auto; padding:20px;}

  .view{display:none;}
  .view.active{display:block;}

  .filter-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
  }
  select{
    background:var(--bg-card);
    color:var(--text);
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 14px;
    font-size:14px;
    font-weight:600;
    min-width:220px;
  }
  .filter-label{font-size:13px; color:var(--text-dim);}

  .day-card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:12px;
    margin-bottom:16px;
    overflow:hidden;
  }
  .day-head{
    padding:14px 18px;
    border-bottom:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    background:var(--bg-elevated);
  }
  .day-head .date{font-weight:700; font-size:15px;}
  .day-head .theme{font-size:12.5px; color:var(--text-dim);}

  .event{
    padding:16px 18px;
    border-bottom:1px solid var(--border);
  }
  .event:last-child{border-bottom:none;}
  .event-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    margin-bottom:6px;
  }
  .event-title{font-weight:700; font-size:14.5px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .event-time{font-size:12.5px; color:var(--red); font-weight:700; white-space:nowrap;}
  .event-meta{font-size:12.5px; color:var(--text-dim); margin-bottom:8px; line-height:1.5;}
  .event-meta .loc::before{content:"📍 ";}
  .status{
    display:inline-block;
    font-size:10.5px;
    font-weight:700;
    letter-spacing:0.4px;
    text-transform:uppercase;
    padding:2px 8px;
    border-radius:20px;
    margin-left:8px;
  }
  .event.no-film{
    background:rgba(226,35,26,0.05);
    border-left:3px solid var(--red);
    padding-left:15px;
  }
  .no-film-icon{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:22px;
    height:22px;
    border-radius:50%;
    background:var(--red);
    flex-shrink:0;
    margin-right:2px;
  }
  .no-film-icon svg{width:13px; height:13px; display:block;}
  .status.confirmed{background:rgba(59,165,93,0.15); color:var(--green);}
  .status.tbc{background:rgba(217,164,65,0.15); color:var(--amber);}
  .status.notfilmed{background:rgba(226,35,26,0.15); color:var(--red);}

  .chips{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;}
  .chip{
    background:var(--chip-bg);
    border:1px solid var(--border);
    border-radius:20px;
    padding:3px 10px;
    font-size:11.5px;
    color:var(--text-dim);
  }
  .chip.contributor{color:var(--text); border-color:#3a3020; background:rgba(217,164,65,0.08);}

  .event-notes{
    font-size:12.5px;
    color:var(--text-dim);
    background:var(--bg-elevated);
    border-radius:8px;
    padding:10px 12px;
    margin-top:10px;
    line-height:1.5;
  }
  .event-notes strong{color:var(--text-dim);}

  .doc-links{margin-top:10px; display:flex; gap:8px; flex-wrap:wrap;}
  .doc-link{
    font-size:12px;
    color:var(--text-faint);
    border:1px dashed var(--border);
    border-radius:6px;
    padding:5px 10px;
    display:flex;
    align-items:center;
    gap:5px;
  }

  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--text-faint);
    font-size:14px;
  }

  .contacts-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(230px, 1fr));
    gap:12px;
    margin-bottom:8px;
  }
  .contact-card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:10px;
    transition:border-color .15s;
  }
  .contact-card:hover{border-color:#3a3f47;}
  .contact-avatar{
    width:42px;
    height:42px;
    border-radius:50%;
    background:var(--red-dim);
    color:#ffd9d6;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:800;
    font-size:15px;
    letter-spacing:0.5px;
  }
  .contact-name{font-weight:700; font-size:14.5px;}
  .contact-role{font-size:12.5px; color:var(--text-dim); line-height:1.4;}
  .contact-info{font-size:12.5px; color:var(--text-dim); border-top:1px solid var(--border); padding-top:10px; margin-top:auto;}
  .contact-info a{color:var(--text); text-decoration:none; border-bottom:1px solid var(--border); display:inline-block; margin-bottom:3px;}

  .section-label{
    font-size:11px;
    font-weight:700;
    letter-spacing:1.2px;
    text-transform:uppercase;
    color:var(--text-faint);
    margin:24px 0 10px;
  }
  .section-label:first-child{margin-top:0;}

  .travel-card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px 18px;
    margin-bottom:20px;
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:16px;
    font-size:12.5px;
  }
  .travel-card .leg{min-width:200px;}
  .travel-card .leg-label{color:var(--text-faint); text-transform:uppercase; font-size:10.5px; letter-spacing:1px; margin-bottom:4px;}
  .travel-card .leg-main{font-weight:700; font-size:14px;}
  .travel-card .leg-sub{color:var(--text-dim); margin-top:2px;}

  footer{
    max-width:960px;
    margin:0 auto;
    padding:30px 20px 50px;
    color:var(--text-faint);
    font-size:11.5px;
    text-align:center;
  }

  @media (max-width:600px){
    .header-inner{flex-direction:column; align-items:flex-start; gap:6px;}
    .header-meta{text-align:left;}
    nav.tabs{overflow-x:auto;}
  }
</style>
</head>
<body>

<header>

    <div class="brand">
      <span class="brand-mark">FIXER.FO</span>

    <button class="tab-btn active" data-tab="schedule">Schedule</button>

<main>

  <!-- FULL SCHEDULE -->

  <!-- MY SCHEDULE -->
  <div class="view" id="view-myschedule">
    <div class="filter-row">

    <div class="contacts-grid" id="contacts-cgtn"></div>
    <div class="section-label">Local Production</div>
    <div class="contacts-grid" id="contacts-local"></div>
    <div class="section-label">Contributors</div>
    <div class="contacts-grid" id="contacts-contributors"></div>
  </div>

</main>

<footer>
  FIXER.FO — Faroe Islands local production &amp; fixing · CGTN production 25–31 July 2026
</footer>

// ---------- RENDER HELPERS ----------

function chipHtml(person){
  const isContributor = !CORE_CREW.includes(person);
  return `<span class="chip${isContributor ? ' contributor' : ''}">${person}</span>`;
}

function docLinksHtml(docs){
  if(!docs || docs.length===0) return "";
  return `<div class="doc-links">${docs.map(d=>`<span class="doc-link">📎 ${d}</span>`).join("")}</div>`;
}

const NO_FILM_ICON = `<span class="no-film-icon" title="Not to be filmed"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 6C4 5.44772 4.44772 5 5 5H14C14.5523 5 15 5.44772 15 6V18C15 18.5523 14.5523 19 14 19H5C4.44772 19 4 18.5523 4 18V6Z" fill="white"/><path d="M15 9L20 6.5V17.5L15 15" fill="white"/><line x1="2" y1="2" x2="22" y2="22" stroke="#e2231a" stroke-width="3"/><line x1="2" y1="2" x2="22" y2="22" stroke="white" stroke-width="1.4"/></svg></span>`;

function eventHtml(ev){
  const isNoFilm = ev.status === 'notfilmed';
  return `
    <div class="event${isNoFilm ? ' no-film' : ''}">
      <div class="event-top">
        <div class="event-title">${isNoFilm ? NO_FILM_ICON : ''}${ev.title}<span class="status ${ev.status}">${ev.status === 'confirmed' ? 'Confirmed' : (ev.status === 'notfilmed' ? 'Not filmed' : 'TBC')}</span></div>
        <div class="event-time">${ev.time}</div>
      </div>
      <div class="event-meta"><span class="loc">${ev.location}</span></div>
      <div class="chips">${ev.people.map(chipHtml).join("")}</div>
      ${ev.notes ? `<div class="event-notes">${ev.notes}</div>` : ""}
      ${docLinksHtml(ev.docs)}
    </div>
  `;
}

function dayCardHtml(day){
  return `
    <div class="day-card">
      <div class="day-head">
        <div class="date">${day.date}</div>
        <div class="theme">${day.theme}</div>
      </div>
      ${day.events.map(eventHtml).join("")}
    </div>
  `;
}

function travelHtml(){
  return `
    <div class="travel-card">
      <div class="leg">
        <div class="leg-label">${travel.arrival.label}</div>
        <div class="leg-main">${travel.arrival.main}</div>
        <div class="leg-sub">${travel.arrival.sub}</div>
      </div>
      <div class="leg">
        <div class="leg-label">${travel.departure.label}</div>
        <div class="leg-main">${travel.departure.main}</div>
        <div class="leg-sub">${travel.departure.sub}</div>
      </div>
    </div>
  `;
}

function initials(name){
  return name
    .split(/[\s&]+/)
    .filter(Boolean)
    .slice(0,2)
    .map(w=>w[0])
    .join("")
    .toUpperCase();
}

function contactCardHtml(c){
  let infoParts = [];
  if(c.phone) infoParts.push(c.phone === "TBC" ? `<span>📞 TBC</span>` : `<a href="tel:${c.phone.replace(/\s/g,'')}">📞 ${c.phone}</a>`);
  if(c.email) infoParts.push(`<a href="mailto:${c.email}">✉️ ${c.email}</a>`);
  if(infoParts.length===0) infoParts.push(`<span>No contact details yet</span>`);
  return `
    <div class="contact-card">
      <div class="contact-avatar">${initials(c.name)}</div>
      <div>
        <div class="contact-name">${c.name}</div>
        <div class="contact-role">${c.role}</div>
      </div>
      <div class="contact-info">${infoParts.join("<br>")}</div>
    </div>
  `;
}

// ---------- INIT ----------

document.getElementById('travel-block').innerHTML = travelHtml();
document.getElementById('schedule-days').innerHTML = schedule.map(dayCardHtml).join("");

document.getElementById('contacts-cgtn').innerHTML = contacts.cgtn.map(contactCardHtml).join("");
document.getElementById('contacts-local').innerHTML = contacts.local.map(contactCardHtml).join("");
document.getElementById('contacts-contributors').innerHTML = contacts.contributors.map(contactCardHtml).join("");

// Populate name dropdown (core crew + contributors with named individuals)
const allNames = new Set();
CORE_CREW.forEach(n=>allNames.add(n));
schedule.forEach(day=>day.events.forEach(ev=>ev.people.forEach(p=>allNames.add(p))));
const nameSelect = document.getElementById('name-select');
[...allNames].sort().forEach(name=>{
  const opt = document.createElement('option');
  opt.value = name;
  opt.textContent = name;
  nameSelect.appendChild(opt);
});

nameSelect.addEventListener('change', ()=>{
  const selected = nameSelect.value;
  const container = document.getElementById('my-schedule-days');
  if(!selected){
    container.innerHTML = `<div class="empty-state">Select your name above to see your personal schedule.</div>`;
    return;
  }
  const filteredDays = schedule
    .map(day=>({...day, events: day.events.filter(ev=>ev.people.includes(selected))}))
    .filter(day=>day.events.length>0);
  if(filteredDays.length===0){
    container.innerHTML = `<div class="empty-state">No scheduled events found for ${selected}.</div>`;
    return;
  }
  container.innerHTML = filteredDays.map(dayCardHtml).join("");
});
document.getElementById('my-schedule-days').innerHTML = `<div class="empty-state">Select your name above to see your personal schedule.</div>`;

// Tabs
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-' + btn.dataset.tab).classList.add('active');
  });
});
</script>
